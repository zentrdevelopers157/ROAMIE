# ============================================
# ROAMIE — CI/CD Pipeline
# Runs on every push to main & PRs to main.
# Deploys to Vercel automatically on main.
# ============================================

name: Roamie CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

# Cancel in-flight runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # QUALITY GATE — typecheck + lint + build
  # ──────────────────────────────────────────
  quality:
    name: 🔍 Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔷 TypeScript typecheck
        run: npx tsc -b
        env:
          # Provide placeholder env vars so typecheck doesn't fail on missing
          VITE_GEMINI_API_KEY: 'ci-placeholder'
          VITE_MAPBOX_TOKEN: 'ci-placeholder'
          VITE_SUPABASE_URL: 'https://ci-placeholder.supabase.co'
          VITE_SUPABASE_ANON_KEY: 'ci-placeholder'

      - name: 🧹 Lint (oxlint)
        run: npx oxlint
        continue-on-error: true  # Warnings won't block the pipeline

      - name: 🏗️ Build
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: 'ci-placeholder'
          VITE_MAPBOX_TOKEN: 'ci-placeholder'
          VITE_SUPABASE_URL: 'https://ci-placeholder.supabase.co'
          VITE_SUPABASE_ANON_KEY: 'ci-placeholder'

  # ──────────────────────────────────────────
  # DEPLOY — to Vercel (main only)
  # ──────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Production Build
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel

      - name: 📡 Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --yes
